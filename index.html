<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

html,body{
height:100%;
overflow-x:hidden;
}

body{
background:linear-gradient(140deg,#f8d7ff,#ffd7e8,#ffe5c7);
background-size:300% 300%;
animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Scroll height */

.scroll-space{
height:600vh;
}

/* Glass panel */

.glass-box{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;

width:90%;
max-width:850px;
height:65vh;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.28);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-radius:28px;
border:1px solid rgba(255,255,255,0.45);

box-shadow:0 20px 40px rgba(0,0,0,0.12);

padding:40px;
text-align:center;

overflow:hidden;

}

/* Text container */

.text{
font-size:28px;
color:#333;
line-height:1.6;
transition:transform 0.3s ease;
}

/* Title row */

.title-row{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
font-size:32px;
font-weight:500;
}

.title-row .flower{
font-size:36px;
}

/* Floating petals */

.petal{
position:fixed;
font-size:22px;
opacity:0.7;
pointer-events:none;
animation:rise linear forwards;
z-index:0;
}

@keyframes rise{

0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}

10%{
opacity:0.7;
}

100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}

}

/* Celebration swirl */

@keyframes swirl{
0%{transform:translateY(0) rotate(0deg)}
100%{transform:translateY(-120vh) rotate(720deg)}
}

/* Mobile */

@media(max-width:600px){

.text{
font-size:22px;
}

.title-row{
font-size:24px;
}

.glass-box{
height:60vh;
padding:30px;
}

}

</style>
</head>

<body>

<div class="glass-box">

<div id="message" class="text">

<div class="title-row">
<span class="flower">🌸</span>
<span>Happy Women's Day</span>
<span class="flower">🌸</span>
</div>

</div>

</div>

<div class="scroll-space"></div>

<script>

/* Messages */

const messages=[

`<div class="title-row">
<span class="flower">🌸</span>
<span>Happy Women's Day</span>
<span class="flower">🌸</span>
</div>`,

`Today we celebrate the strength
that shapes the world.`,

`The courage to rise
again and again.`,

`The kindness that makes
life brighter.`,

`To every incredible woman —
today is for you. 💐`

];

let lastIndex=0;

/* Scroll cinematic movement */

window.addEventListener("scroll",()=>{

const scrollTop = window.scrollY;
const docHeight = document.documentElement.scrollHeight - window.innerHeight;

const progress = scrollTop / docHeight;

const index = Math.min(
messages.length - 1,
Math.floor(progress * messages.length)
);

const box=document.getElementById("message");

/* move text upward smoothly */

const offset=(progress*messages.length-index)*120;
box.style.transform=`translateY(-${offset}px)`;

/* change message */

if(index!==lastIndex){

box.innerHTML=messages[index];
box.style.transform="translateY(60px)";
setTimeout(()=>{box.style.transform="translateY(0)"},100);

lastIndex=index;

/* celebration on final message */

if(index===messages.length-1){
celebrate();
}

}

});

/* Floating petals */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*6+8)+"s";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},14000);

}

setInterval(createPetal,900);

/* Celebration swirl */

function celebrate(){

for(let i=0;i<25;i++){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";
petal.style.fontSize="26px";
petal.style.animation="swirl 4s ease-out forwards";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),4000);

}

}

</script>

</body>
</html>
