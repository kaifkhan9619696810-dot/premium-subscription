<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(120deg,#eef2ff,#f6f8ff,#edf1ff);
background-size:300% 300%;
animation:bgMove 20s ease infinite;
overflow-x:hidden;
color:#333;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PETALS */

#petal-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.petal{
position:absolute;
font-size:22px;
opacity:0.85;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh) translateX(0) rotate(0deg);
}

50%{
transform:translateY(50vh) translateX(25px) rotate(180deg);
}

100%{
transform:translateY(110vh) translateX(-25px) rotate(360deg);
}

}

/* SECTIONS */

section{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

/* GLASS CARD */

.card{

width:96%;
max-width:1000px;

min-height:75vh;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.6);
backdrop-filter:blur(24px);

border-radius:32px;
border:1px solid rgba(255,255,255,0.8);

box-shadow:0 35px 90px rgba(0,0,0,0.15);

padding:120px 80px;

text-align:center;

opacity:0;
transform:translateY(80px) scale(0.96);

transition:
opacity 0.9s ease,
transform 0.9s ease;

z-index:2;

}

/* CARD VISIBLE */

.card.show{
opacity:1;
transform:translateY(0) scale(1);
}

/* TITLE */

.title{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
font-size:46px;
font-weight:500;
}

.title span{
font-size:48px;
}

/* TEXT */

.text{
font-size:30px;
line-height:1.7;
}

/* FINAL GLOW */

.final{
animation:glow 2.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 30px 80px rgba(0,0,0,0.15);}
to{box-shadow:0 35px 100px rgba(120,150,255,0.4);}
}

/* RIPPLE EFFECT */

.ripple{

position:fixed;

width:80px;
height:80px;

border-radius:50%;

border:2px solid rgba(255,255,255,0.7);

transform:scale(0);

animation:rippleAnim 0.9s ease-out;

pointer-events:none;

z-index:3;

}

@keyframes rippleAnim{

to{
transform:scale(5);
opacity:0;
}

}

/* MOBILE */

@media(max-width:600px){

.card{
padding:80px 35px;
min-height:70vh;
}

.title{
font-size:34px;
}

.title span{
font-size:36px;
}

.text{
font-size:24px;
}

}

</style>
</head>

<body>

<div id="petal-layer"></div>

<section>
<div class="card">
<div class="title">
<span>🌸</span>
Happy Women's Day
<span>🌸</span>
</div>
</div>
</section>

<section>
<div class="card text">
Today we celebrate the strength that shapes the world.
</div>
</section>

<section>
<div class="card text">
The courage to rise again and again.
</div>
</section>

<section>
<div class="card text">
The kindness that makes life brighter.
</div>
</section>

<section>
<div class="card text final">
To every incredible woman — today is for you. 💐
</div>
</section>

<script>

/* SCROLL REVEAL */

const cards=document.querySelectorAll(".card");

function revealCards(){

const trigger=window.innerHeight*0.55;

cards.forEach(card=>{

const rect=card.getBoundingClientRect();

if(rect.top<trigger && rect.bottom>trigger){

card.classList.add("show");

}else{

card.classList.remove("show");

}

});

}

window.addEventListener("scroll",revealCards);
revealCards();

/* PETALS */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"%";
petal.style.animationDuration=(Math.random()*6+6)+"s";

document.getElementById("petal-layer").appendChild(petal);

setTimeout(()=>{
petal.remove();
},12000);

}

setInterval(createPetal,700);

/* RIPPLE ON TOUCH */

document.addEventListener("click",function(e){

createRipple(e.clientX,e.clientY);

});

/* RIPPLE ON SCROLL */

let lastScroll=0;

window.addEventListener("scroll",function(){

const now=Date.now();

if(now-lastScroll>200){

createRipple(window.innerWidth/2,window.innerHeight/2);

lastScroll=now;

}

});

/* RIPPLE FUNCTION */

function createRipple(x,y){

const ripple=document.createElement("div");

ripple.className="ripple";

ripple.style.left=(x-40)+"px";
ripple.style.top=(y-40)+"px";

document.body.appendChild(ripple);

setTimeout(()=>{
ripple.remove();
},900);

}

/* PARALLAX BACKGROUND */

window.addEventListener("scroll",function(){

const scroll=window.scrollY;

document.body.style.backgroundPosition=
"center "+(scroll*0.25)+"px";

});

</script>

</body>
</html>
