<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 🌸</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins, sans-serif;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:gradient 10s ease infinite;
overflow:hidden;
color:white;
text-align:center;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
z-index:10;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

#typeText{
font-size:1.3rem;
min-height:40px;
}

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4b8b;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.message{
margin-top:20px;
font-size:1.4rem;
display:none;
}

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

.burst{
position:absolute;
font-size:24px;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
0%{transform:scale(0)}
100%{transform:scale(2) translateY(-100px);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Happy Women's Day 🌸</h1>

<div id="typeText"></div>

<button onclick="surprise()">Open Surprise 💌</button>

<div class="message" id="msg">

Your strength, kindness, and courage inspire everyone around you.  
Never forget how powerful and extraordinary you truly are. 💐
</div>

</div>

document.getElementById("typeText").innerHTML+=text.charAt(i);

setTimeout(typeWriter,40);

setTimeout(()=>{

},6000);
}

setInterval(createHeart,250);
