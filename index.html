<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(140deg,#f8d7ff,#ffd7e8,#ffe5c7);
background-size:300% 300%;
animation:bgMove 18s ease infinite;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PETAL LAYER */

#petal-layer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

/* PETALS */

.petal{
position:absolute;
font-size:24px;
opacity:0.8;
animation:rise linear forwards;
}

@keyframes rise{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}
10%{
opacity:0.8;
}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* SWIRL CELEBRATION */

@keyframes swirl{
0%{transform:translateY(0) rotate(0deg)}
100%{transform:translateY(-120vh) rotate(720deg)}
}

/* GLASS PANEL */

.glass-box{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:3;

width:90%;
max-width:850px;
height:60vh;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.28);
backdrop-filter:blur(18px);

border-radius:28px;
border:1px solid rgba(255,255,255,0.45);

box-shadow:0 20px 40px rgba(0,0,0,0.12);

padding:40px;
text-align:center;
}

/* GLASS GLOW */

@keyframes glassGlow{
0%{background:rgba(255,255,255,0.28);}
50%{background:rgba(255,255,255,0.38);}
100%{background:rgba(255,255,255,0.28);}
}

.glow{
animation:glassGlow 2.5s ease-in-out;
}

/* TEXT */

.text{
font-size:28px;
color:#333;
line-height:1.6;
transition:all 0.6s ease;
}

/* TITLE */

.title-row{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
font-size:32px;
font-weight:500;
}

.title-row .flower{
font-size:36px;
}

/* SCROLL SECTIONS */

.section{
height:100vh;
}

@media(max-width:600px){

.text{
font-size:22px;
}

.title-row{
font-size:24px;
}

.glass-box{
height:55vh;
padding:30px;
}

}

</style>
</head>

<body>

<div id="petal-layer"></div>

<div class="glass-box">

<div id="message" class="text">

<div class="title-row">
<span class="flower">🌸</span>
<span>Happy Women's Day</span>
<span class="flower">🌸</span>
</div>

</div>

</div>

<!-- SCROLL SPACE -->

<div class="section"></div>
<div class="section"></div>
<div class="section"></div>
<div class="section"></div>
<div class="section"></div>

<script>

/* MESSAGES */

const messages=[

`<div class="title-row">
<span class="flower">🌸</span>
<span>Happy Women's Day</span>
<span class="flower">🌸</span>
</div>`,

`Today we celebrate the strength that shapes the world.`,

`The courage to rise again and again.`,

`The kindness that makes life brighter.`,

`To every incredible woman — today is for you. 💐`

];

let currentIndex=-1;
let celebrationDone=false;

/* SCROLL DETECTION */

window.addEventListener("scroll",()=>{

let index=Math.round(window.scrollY / window.innerHeight);

/* prevent undefined */

if(index>=messages.length){
index=messages.length-1;
}

if(index<0){
index=0;
}

if(index!==currentIndex){

const box=document.getElementById("message");

box.style.opacity=0;
box.style.transform="translateY(20px)";

setTimeout(()=>{

box.innerHTML=messages[index];

box.style.opacity=1;
box.style.transform="translateY(0)";

},250);

currentIndex=index;

/* trigger celebration */

if(index===messages.length-1 && !celebrationDone){

celebrationDone=true;
celebrate();

}

}

});

/* FLOATING PETALS */

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"%";
petal.style.animationDuration=(Math.random()*6+8)+"s";

document.getElementById("petal-layer").appendChild(petal);

setTimeout(()=>petal.remove(),14000);

}

setInterval(createPetal,600);

/* CELEBRATION */

function celebrate(){

const glass=document.querySelector(".glass-box");

glass.classList.add("glow");

setTimeout(()=>{
glass.classList.remove("glow");
},2500);

for(let i=0;i<40;i++){

const petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"%";
petal.style.fontSize="30px";
petal.style.animation="swirl 3.5s ease-out forwards";

document.getElementById("petal-layer").appendChild(petal);

setTimeout(()=>petal.remove(),3500);

}

}

</script>

</body>
</html>
